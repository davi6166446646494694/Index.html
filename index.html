<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASIL PLAY ALPHAN</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b1a;
    color: white;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    padding: 25px;
    background: rgba(10,10,30,0.95);
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,255,200,0.3);
}

h1 {
    text-align: center;
    color: #00ffc8;
}

p {
    text-align: center;
    color: #aaa;
    font-size: 14px;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    background: #1c1c3a;
    color: white;
}

textarea {
    min-height: 90px;
}

button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(45deg, #00ffc8, #00ccaa);
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 BRASIL PLAY ALPHAN</h1>

<p>Responda com atenção. Respostas mal feitas podem resultar em reprovação.</p>

<form action="https://formspree.io/f/xnjlayyj" method="POST" onsubmit="montarFormulario()">

<input id="nome" placeholder="1. Qual é o seu nome dentro do jogo?" required>
<input id="idade" placeholder="2. Qual a sua idade real?" required>
<input id="tempo" placeholder="3. Há quanto tempo você joga no servidor ou no estilo RP?">
<input id="experiencia" placeholder="4. Você já teve alguma experiência como ADM ou moderador? Explique">

<select id="jaFoiAdm">
<option value="">5. Você já foi ADM ou Helper alguma vez?</option>
<option>Sim</option>
<option>Não</option>
</select>

<input id="horario" placeholder="6. Em quais horários você costuma jogar?">

<textarea id="motivo" placeholder="7. Por que você acha que merece ser escolhido como ADM?" required></textarea>

<select id="microfone">
<option value="">8. Você possui microfone?</option>
<option>Sim</option>
<option>Não</option>
</select>

<select id="regras">
<option value="">9. Você conhece as regras?</option>
<option>Sim</option>
<option>Não</option>
</select>

<input id="discord" placeholder="10. Discord">

<textarea id="atender" placeholder="11. Como você atenderia um jogador?"></textarea>
<textarea id="informar" placeholder="12. Como reagiria a xingamento?"></textarea>
<textarea id="duvidas" placeholder="13. Como ajuda iniciantes?"></textarea>
<textarea id="equipe" placeholder="14. Trabalha bem em equipe?"></textarea>
<textarea id="calmo" placeholder="15. Jogador nervoso?"></textarea>

<select id="ativo">
<option value="">16. Você é ativo?</option>
<option>Sim</option>
<option>Não</option>
</select>

<select id="discordUso">
<option value="">17. Usa Discord todo dia?</option>
<option>Sim</option>
<option>Não</option>
</select>

<select id="paciencia">
<option value="">18. Tem paciência?</option>
<option>Sim</option>
<option>Não</option>
</select>

<textarea id="ideia" placeholder="19. Ideia para melhorar"></textarea>
<textarea id="meta" placeholder="20. Sua meta"></textarea>

<input id="telefone" placeholder="21. Telefone" required>

<!-- NOVAS PERGUNTAS -->
<textarea id="pergunta1" placeholder="22. O QUE VOCÊ FARIA SE VISSE GENTE ATROPELANDO OUTRA PESSOA SEM MOTIVO?"></textarea>

<textarea id="pergunta2" placeholder="23. POR QUE VOCÊ DEVE SER ESCOLHIDO?"></textarea>

<textarea id="pergunta3" placeholder="24. COMO VOCÊ REAGIRIA SE ALGUÉM COMEÇASSE A BATER EM VOCÊ?"></textarea>

<input id="pergunta4" placeholder="25. QUANTAS HORAS DE JOGO VOCÊ TEM JOGADA">

<textarea id="pergunta5" placeholder="26. O QUE VOCÊ FARIA SE ALGUÉM COMEÇASSE XINGAR VOCÊ EM ATENDIMENTO?"></textarea>

<select id="pergunta6">
<option value="">27. VOCÊ É MUITO ESTRESSADO?</option>
<option>Sim</option>
<option>Não</option>
<option>Às vezes</option>
</select>

<textarea name="mensagem" id="mensagem" hidden></textarea>

<button type="submit">🚀 ENVIAR FORMULÁRIO</button>

</form>

</div>
<script>
function montarFormulario(){

let texto = `
══════════════════════
📩 FORMULÁRIO DE ADM
BRASIL PLAY ALPHAN
══════════════════════

1. Qual é o seu nome dentro do jogo?
Resposta:
${nome.value}

2. Qual a sua idade real?
Resposta:
${idade.value}

3. Há quanto tempo você joga no servidor ou no estilo RP?
Resposta:
${tempo.value}

4. Você já teve alguma experiência como ADM ou moderador? Explique
Resposta:
${experiencia.value}

5. Você já foi ADM ou Helper alguma vez?
Resposta:
${jaFoiAdm.value}

6. Em quais horários você costuma jogar?
Resposta:
${horario.value}

7. Por que você acha que merece ser escolhido como ADM?
Resposta:
${motivo.value}

8. Você possui microfone?
Resposta:
${microfone.value}

9. Você conhece as regras do servidor?
Resposta:
${regras.value}

10. Qual é o seu Discord?
Resposta:
${discord.value}

11. Como você atenderia um jogador com dúvida?
Resposta:
${atender.value}

12. Como reagiria a xingamentos?
Resposta:
${informar.value}

13. Como ajuda jogadores iniciantes?
Resposta:
${duvidas.value}

14. Você trabalha bem em equipe?
Resposta:
${equipe.value}

15. O que faria com jogador nervoso?
Resposta:
${calmo.value}

16. Você é ativo?
Resposta:
${ativo.value}

17. Usa Discord diariamente?
Resposta:
${discordUso.value}

18. Tem paciência?
Resposta:
${paciencia.value}

19. Que ideia você daria para melhorar?
Resposta:
${ideia.value}

20. Qual sua meta como ADM?
Resposta:
${meta.value}

21. Seu telefone:
Resposta:
${telefone.value}

22. O que você faria se visse alguém atropelando outra pessoa sem motivo?
Resposta:
${pergunta1.value}

23. Por que você deve ser escolhido?
Resposta:
${pergunta2.value}

24. Como reagiria se alguém começasse a bater em você?
Resposta:
${pergunta3.value}

25. Quantas horas de jogo você tem?
Resposta:
${pergunta4.value}

26. O que faria se alguém te xingasse em atendimento?
Resposta:
${pergunta5.value}

27. Você é muito estressado?
Resposta:
${pergunta6.value}

══════════════════════
`;

document.getElementById("mensagem").value = texto;
}
</script>
`;

document.getElementById("mensagem").value = texto;
}
</script>

</body>
</html>
